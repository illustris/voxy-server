name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get Voxy dependency commit hash
        id: voxy-rev
        run: echo "rev=$(git ls-remote https://github.com/MCRcortex/voxy.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache Voxy dependency
        id: voxy-cache
        uses: actions/cache@v4
        with:
          path: libs/voxy.jar
          key: voxy-dep-${{ steps.voxy-rev.outputs.rev }}

      - name: Build Voxy dependency
        if: steps.voxy-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/MCRcortex/voxy.git /tmp/voxy
          cd /tmp/voxy
          ./gradlew jar --no-daemon
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp build/libs/voxy-*.jar "$GITHUB_WORKSPACE/libs/voxy.jar"

      - name: Build all versions
        run: ./gradlew :26.1.2:build :1.21.11:build :1.21.1:build :1.20.1:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxy-server
          path: |
            versions/*/build/libs/voxy-server-*.jar
            !versions/*/build/libs/voxy-server-*-sources.jar

      - name: Upload Voxy dependency
        uses: actions/upload-artifact@v4
        with:
          name: voxy-dep
          path: libs/voxy.jar

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            versions/26.1.2/gradle.properties
          sparse-checkout-cone-mode: false

      - name: Read Fabric API version
        id: versions
        run: |
          fabric_version=$(grep '^deps.fabric_api=' versions/26.1.2/gradle.properties | cut -d= -f2)
          echo "fabric_version=$fabric_version" >> "$GITHUB_OUTPUT"

      - name: Download voxy-server artifact
        uses: actions/download-artifact@v4
        with:
          name: voxy-server
          path: artifacts/

      - name: Download Voxy dependency
        uses: actions/download-artifact@v4
        with:
          name: voxy-dep
          path: artifacts/

      - name: Cache deploy dependencies
        id: deploy-cache
        uses: actions/cache@v4
        with:
          path: deploy-cache/
          key: deploy-deps-fabric-${{ steps.versions.outputs.fabric_version }}-sodium-0.8.9

      - name: Download Fabric API
        if: steps.deploy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p deploy-cache
          curl -L -o deploy-cache/fabric-api.jar \
            "https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/${{ steps.versions.outputs.fabric_version }}/fabric-api-${{ steps.versions.outputs.fabric_version }}.jar"

      - name: Download Sodium
        if: steps.deploy-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o deploy-cache/sodium.jar \
            "https://cdn.modrinth.com/data/AANobbMI/versions/uGvVQBnw/sodium-fabric-0.8.9%2Bmc26.1.1.jar"

      - name: Copy cached deps to artifacts
        run: |
          cp deploy-cache/fabric-api.jar artifacts/fabric-api.jar
          cp deploy-cache/sodium.jar artifacts/sodium.jar

      - name: Deploy to staging
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SERVER: mc@148.113.25.30
          SSH_PORT: "2223"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p $SSH_PORT"

          SCP_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P $SSH_PORT"

          # Deploy the 26.1.2 jar to staging (exclude -sources.jar)
          MOD_JAR=$(find artifacts/ -name 'voxy-server-26.1.2-*.jar' ! -name '*-sources.jar' | head -1)

          # Stop server gracefully
          ssh $SSH_OPTS "$SERVER" "sudo /run/current-system/sw/bin/systemctl stop voxy-server" || true

          # Deploy mod jars to server
          scp $SCP_OPTS "$MOD_JAR" "$SERVER:/server/voxy/mods/voxy-server.jar"
          scp $SCP_OPTS artifacts/voxy.jar "$SERVER:/server/voxy/mods/voxy.jar"
          scp $SCP_OPTS artifacts/fabric-api.jar "$SERVER:/server/voxy/mods/fabric-api.jar"
          scp $SCP_OPTS artifacts/sodium.jar "$SERVER:/server/voxy/mods/sodium.jar"

          # Publish jar for client download via nginx
          scp $SCP_OPTS "$MOD_JAR" "$SERVER:/server/voxy/downloads/voxy-server-latest.jar"

          # Start server
          ssh $SSH_OPTS "$SERVER" "sudo /run/current-system/sw/bin/systemctl start voxy-server"

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: voxy-server
          path: release-jars/

      - name: Flatten jars for release
        run: |
          mkdir -p release/
          find release-jars/ -name 'voxy-server-*.jar' ! -name '*-sources.jar' -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/voxy-server-*.jar
          generate_release_notes: true
