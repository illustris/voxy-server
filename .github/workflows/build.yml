name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Voxy dependency
        run: |
          git clone --depth 1 https://github.com/MCRcortex/voxy.git /tmp/voxy
          cd /tmp/voxy
          ./gradlew jar
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp build/libs/voxy-*.jar "$GITHUB_WORKSPACE/libs/voxy.jar"

      - name: Build mod
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxy-server
          path: build/libs/voxy-server-*.jar

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: voxy-server

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: voxy-server-*.jar
          generate_release_notes: true
